name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [ main, develop, 'cursor/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Runs integration-testing.js: voucher validation (6) + hotel availability (6).
  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest
        
    - name: Deploy Edge Functions used by integration tests
      run: |
        set -euo pipefail
        supabase --version
        # Length-only check: confirms the secret is wired without printing the token
        echo "SUPABASE_ACCESS_TOKEN length: ${#SUPABASE_ACCESS_TOKEN}"
        if [ "${#SUPABASE_ACCESS_TOKEN}" -lt 20 ]; then
          echo "SUPABASE_ACCESS_TOKEN looks missing or too short for a Supabase PAT — check repo secret name/value." >&2
          exit 1
        fi
        supabase functions deploy check-hotel-availability --project-ref ynlnrvuqypmwpevabtdc
        supabase functions deploy validate-voucher --project-ref ynlnrvuqypmwpevabtdc
        supabase functions deploy fetch-hotel-data --project-ref ynlnrvuqypmwpevabtdc
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        
    - name: Run integration tests
      run: |
        # Set environment variables for the test script
        export SUPABASE_URL="https://ynlnrvuqypmwpevabtdc.supabase.co"
        export SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
        export SCRAPERAPI_KEY="${{ secrets.SCRAPERAPI_KEY }}"
        
        echo "Running complete integration tests..."
        
        # Run the complete integration test suite
        npm run test:integration
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        
    - name: Cleanup
      if: always()
      run: |
        # Clean up test function if needed
        echo "Test completed"
